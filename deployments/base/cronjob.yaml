apiVersion: batch/v1
kind: CronJob
metadata:
  name: distillation
  namespace: distillation
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
          - name: workspace-volume
            emptyDir: {}
          # TODO: NFS 서버 세팅 후 nfs-volume 추가하여 main container에 /mnt/nfs/distillation mount (pvc-distillation-nfs)
          - name: codex-auth
            secret:
              secretName: secret-codex
          initContainers:
          - name: dump-coverage
            image: distillation:latest
            command:
            - distill
            - coverage
            - --output
            - /workspace/output/coverage.json
            envFrom:
            - secretRef:
                name: secret-postgres
            env:
            - name: POSTGRES_HOST
              value: svc-postgres
            - name: POSTGRES_DB
              value: distillation
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            volumeMounts:
            - name: workspace-volume
              mountPath: /workspace/output
          containers:
          - name: distillation
            image: distillation:latest
            command:
            - sh
            - /workspace/entrypoint.sh
            envFrom:
            - secretRef:
                name: secret-postgres
            env:
            - name: POSTGRES_HOST
              value: svc-postgres
            - name: POSTGRES_DB
              value: distillation
            - name: CODEX_HOME
              value: /home/codexuser/.codex
            volumeMounts:
            - name: workspace-volume
              mountPath: /workspace/output
            - name: codex-auth
              mountPath: /home/codexuser/.codex/auth.json
              subPath: auth.json
              readOnly: true
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: "2"
                memory: 1Gi
